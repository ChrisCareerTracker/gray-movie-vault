<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>The Gray Movie Vault</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=DM+Mono:wght@300;400;500&family=Crimson+Pro:ital,wght@0,300;0,400;0,600;1,300;1,400&display=swap" rel="stylesheet">
<style>
:root{--bg:#080809;--bg2:#0e0e12;--surface:#13131a;--surface2:#1c1c26;--surface3:#252532;--border:#2a2a3a;--border2:#353548;--gold:#c9a84c;--gold2:#e8c96a;--gold3:#a07830;--gold-glow:rgba(201,168,76,0.15);--text:#f0ece2;--text2:#a8a49c;--text3:#5a5650;--shadow-card:0 8px 32px rgba(0,0,0,0.7),0 2px 8px rgba(0,0,0,0.5);--shadow-hover:0 24px 64px rgba(0,0,0,0.9),0 8px 24px rgba(201,168,76,0.12),0 0 0 1px rgba(201,168,76,0.2);}
*{margin:0;padding:0;box-sizing:border-box;}html{scroll-behavior:smooth;}
body{background:var(--bg);color:var(--text);font-family:'Crimson Pro',Georgia,serif;min-height:100vh;overflow-x:hidden;}
body::before{content:'';position:fixed;inset:0;background-image:url("data:image/svg+xml,%3Csvg viewBox='0 0 512 512' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='n'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.75' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23n)' opacity='0.035'/%3E%3C/svg%3E");pointer-events:none;z-index:9999;mix-blend-mode:overlay;}
::-webkit-scrollbar{width:6px;}::-webkit-scrollbar-track{background:var(--bg);}::-webkit-scrollbar-thumb{background:var(--gold3);border-radius:3px;}::-webkit-scrollbar-thumb:hover{background:var(--gold);}
nav{position:fixed;top:0;left:0;right:0;z-index:300;display:flex;align-items:center;justify-content:space-between;padding:0 32px;height:64px;background:linear-gradient(to bottom,rgba(8,8,9,0.98),transparent);backdrop-filter:blur(4px);}
.nav-logo{display:flex;align-items:center;gap:12px;cursor:pointer;}
.logo-bug{width:40px;height:40px;background:linear-gradient(135deg,var(--gold2),var(--gold),var(--gold3));display:flex;align-items:center;justify-content:center;font-family:'Bebas Neue',sans-serif;font-size:13px;color:#080809;letter-spacing:1px;clip-path:polygon(0 0,calc(100% - 10px) 0,100% 10px,100% 100%,10px 100%,0 calc(100% - 10px));box-shadow:0 4px 20px rgba(201,168,76,0.4);}
.logo-text-wrap{display:flex;flex-direction:column;gap:1px;}
.logo-text{font-family:'Bebas Neue',sans-serif;font-size:20px;letter-spacing:4px;color:var(--gold);line-height:1;}
.logo-sub{font-family:'DM Mono',monospace;font-size:7px;letter-spacing:5px;color:var(--text3);}
.nav-center{display:flex;align-items:center;gap:2px;overflow-x:auto;-webkit-overflow-scrolling:touch;scrollbar-width:none;-ms-overflow-style:none;}
.nav-center::-webkit-scrollbar{display:none;}
.decade-bar{display:none;position:fixed;top:52px;left:0;right:0;z-index:299;
  background:rgba(8,8,9,0.97);backdrop-filter:blur(4px);
  border-bottom:1px solid var(--border);
  padding:6px 10px;overflow-x:auto;white-space:nowrap;
  -webkit-overflow-scrolling:touch;scrollbar-width:none;}
.decade-bar::-webkit-scrollbar{display:none;}
.decade-bar .nav-filter-btn{display:inline-block;white-space:nowrap;}
.nav-filter-btn{font-family:'DM Mono',monospace;font-size:9px;letter-spacing:2px;text-transform:uppercase;padding:5px 10px;border:1px solid transparent;background:transparent;color:var(--text3);cursor:pointer;transition:all 0.2s;white-space:nowrap;}
.nav-filter-btn:hover{color:var(--text2);border-color:var(--border);}
.nav-filter-btn.active{color:var(--gold);border-color:var(--gold3);background:rgba(201,168,76,0.06);}
.nav-right{display:flex;align-items:center;gap:8px;}
.nav-search-wrap{display:flex;align-items:center;gap:8px;background:rgba(28,28,38,0.9);border:1px solid var(--border);padding:6px 12px;width:220px;transition:border-color 0.2s;}
.nav-search-wrap:focus-within{border-color:var(--gold3);}
.nav-search-wrap svg{flex-shrink:0;opacity:0.4;}
.nav-search-wrap input{background:none;border:none;outline:none;color:var(--text);font-family:'Crimson Pro',serif;font-size:15px;width:100%;}
.nav-search-wrap input::placeholder{color:var(--text3);}
.btn-view-toggle{font-family:'DM Mono',monospace;font-size:9px;color:var(--text3);border:1px solid var(--border);padding:6px 10px;background:transparent;cursor:pointer;transition:all 0.2s;display:flex;align-items:center;}
.btn-view-toggle:hover,.btn-view-toggle.active{color:var(--gold);border-color:var(--gold3);}
.btn-collections-nav{font-family:'DM Mono',monospace;font-size:9px;letter-spacing:2px;color:var(--gold);border:1px solid var(--gold3);padding:6px 12px;background:transparent;cursor:pointer;transition:all 0.2s;}
.btn-collections-nav:hover{background:var(--gold-glow);}
.btn-icon{font-family:'DM Mono',monospace;font-size:9px;letter-spacing:2px;color:var(--text3);border:1px solid var(--border);padding:6px 10px;background:transparent;cursor:pointer;transition:all 0.2s;}
.btn-icon:hover,.btn-icon.active{color:var(--gold);border-color:var(--gold3);}
.filter-drawer{position:fixed;top:64px;left:0;right:0;z-index:150;background:rgba(13,13,18,0.97);backdrop-filter:blur(12px);border-bottom:1px solid var(--border);max-height:0;overflow:hidden;transition:max-height 0.35s cubic-bezier(0.4,0,0.2,1),padding 0.3s;}
.filter-drawer.open{max-height:300px;padding:20px 32px;}
.filter-row{display:flex;gap:28px;flex-wrap:wrap;margin-bottom:14px;}
.filter-group{display:flex;flex-direction:column;gap:8px;}
.filter-group-label{font-family:'DM Mono',monospace;font-size:8px;letter-spacing:3px;text-transform:uppercase;color:var(--gold);border-bottom:1px solid var(--border);padding-bottom:4px;}
.filter-chips{display:flex;gap:6px;flex-wrap:wrap;}
.chip{font-family:'DM Mono',monospace;font-size:8px;letter-spacing:1.5px;padding:4px 10px;border:1px solid var(--border);background:transparent;color:var(--text3);cursor:pointer;transition:all 0.15s;text-transform:uppercase;}
.chip:hover{border-color:var(--border2);color:var(--text2);}
.chip.active{border-color:var(--gold3);color:var(--gold);background:rgba(201,168,76,0.08);}
.filter-actions{display:flex;gap:10px;align-items:center;margin-top:4px;}
.btn-clear{font-family:'DM Mono',monospace;font-size:8px;letter-spacing:2px;color:var(--text3);border:1px solid var(--border);padding:5px 12px;background:transparent;cursor:pointer;transition:all 0.2s;}
.btn-clear:hover{color:var(--gold);border-color:var(--gold3);}
.filter-count{font-family:'DM Mono',monospace;font-size:9px;color:var(--text3);letter-spacing:1px;}
#hero{position:relative;height:580px;overflow:hidden;}
.hero-bg{position:absolute;inset:0;background-size:cover;background-position:center 25%;transition:opacity 1.2s ease;}
.hero-overlay{position:absolute;inset:0;background:linear-gradient(to right,rgba(8,8,9,0.97) 0%,rgba(8,8,9,0.75) 45%,rgba(8,8,9,0.15) 75%,rgba(8,8,9,0.4) 100%),linear-gradient(to top,rgba(8,8,9,1) 0%,rgba(8,8,9,0) 40%);}
.hero-content{position:absolute;bottom:90px;left:60px;max-width:540px;}
.hero-eyebrow{font-family:'DM Mono',monospace;font-size:10px;letter-spacing:5px;text-transform:uppercase;color:var(--gold);margin-bottom:14px;display:flex;align-items:center;gap:12px;}
.hero-eyebrow::before{content:'';width:24px;height:1px;background:var(--gold);}
.hero-title{font-family:'Bebas Neue',sans-serif;font-size:76px;line-height:0.9;letter-spacing:2px;color:var(--text);margin-bottom:16px;text-shadow:0 4px 40px rgba(0,0,0,0.8);}
.hero-meta{display:flex;align-items:center;gap:10px;font-family:'DM Mono',monospace;font-size:10px;letter-spacing:2px;color:var(--text2);margin-bottom:16px;flex-wrap:wrap;}
.hdot{color:var(--gold);font-size:5px;}
.hero-desc{font-size:16px;line-height:1.7;color:#c0bcb0;margin-bottom:24px;font-style:italic;}
.btn-hero{font-family:'DM Mono',monospace;font-size:10px;letter-spacing:3px;text-transform:uppercase;background:linear-gradient(135deg,var(--gold2),var(--gold),var(--gold3));color:var(--bg);border:none;padding:13px 28px;cursor:pointer;transition:all 0.3s;clip-path:polygon(0 0,calc(100% - 8px) 0,100% 8px,100% 100%,8px 100%,0 calc(100% - 8px));box-shadow:0 4px 20px rgba(201,168,76,0.3);}
.btn-hero:hover{box-shadow:0 8px 32px rgba(201,168,76,0.5);transform:translateY(-1px);}
.hero-dots{position:absolute;bottom:32px;left:60px;display:flex;gap:10px;}
.hero-dot{width:20px;height:2px;background:var(--border2);cursor:pointer;transition:all 0.4s cubic-bezier(0.4,0,0.2,1);}
.hero-dot.active{background:var(--gold);width:48px;box-shadow:0 0 8px rgba(201,168,76,0.5);}
.stats-bar{display:flex;border-bottom:1px solid var(--border);background:var(--bg2);}
.stat-item{flex:1;padding:14px 20px;border-right:1px solid var(--border);text-align:center;}
.stat-item:last-child{border-right:none;}
.stat-num{font-family:'Bebas Neue',sans-serif;font-size:26px;letter-spacing:2px;color:var(--gold);line-height:1;}
.stat-label{font-family:'DM Mono',monospace;font-size:8px;letter-spacing:2px;color:var(--text3);text-transform:uppercase;margin-top:2px;}
.section{padding:36px 32px 0;}
.section-header{display:flex;align-items:baseline;justify-content:space-between;margin-bottom:18px;padding-bottom:10px;border-bottom:1px solid var(--border);position:relative;}
.section-header::after{content:'';position:absolute;bottom:-1px;left:0;width:60px;height:1px;background:var(--gold);box-shadow:0 0 8px rgba(201,168,76,0.4);}
.section-title{font-family:'Bebas Neue',sans-serif;font-size:26px;letter-spacing:3px;color:var(--text);}
.section-count{font-family:'DM Mono',monospace;font-size:9px;letter-spacing:2px;color:#9a9690;}
.coll-landscape-row{display:grid;grid-template-columns:repeat(3,1fr);gap:16px;margin-bottom:24px;}
.coll-landscape{position:relative;height:160px;overflow:hidden;cursor:pointer;border:1px solid var(--border);transition:border-color 0.3s;}
.coll-landscape:hover{border-color:var(--gold3);}
.coll-landscape:hover .coll-bg-main{transform:scale(1.06);filter:brightness(0.65) saturate(0.9);}
.coll-bg-main{position:absolute;inset:0;background-size:cover;background-position:center;filter:brightness(0.42) saturate(0.7);transition:transform 0.5s cubic-bezier(0.2,0.8,0.2,1),filter 0.4s;}
.coll-overlay{position:absolute;inset:0;background:linear-gradient(to top,rgba(8,8,9,0.97) 0%,rgba(8,8,9,0.4) 65%,transparent 100%);}
.coll-content{position:absolute;bottom:0;left:0;right:0;padding:16px 20px;}
.coll-type{font-family:'DM Mono',monospace;font-size:8px;letter-spacing:3px;text-transform:uppercase;color:var(--gold);margin-bottom:4px;}
.coll-title{font-family:'Bebas Neue',sans-serif;font-size:28px;letter-spacing:2px;color:var(--text);line-height:0.95;margin-bottom:4px;}
.coll-meta{font-family:'DM Mono',monospace;font-size:8px;color:var(--text3);letter-spacing:1px;}
.coll-arrow{position:absolute;top:12px;right:12px;width:28px;height:28px;border:1px solid rgba(201,168,76,0.3);display:flex;align-items:center;justify-content:center;color:var(--gold);opacity:0;transition:opacity 0.2s;font-size:13px;}
.coll-landscape:hover .coll-arrow{opacity:1;}
.coll-section-label{font-family:'Bebas Neue',sans-serif;font-size:20px;letter-spacing:4px;color:var(--text);margin-bottom:14px;padding-bottom:8px;border-bottom:1px solid var(--border);position:relative;}
.coll-section-label::after{content:'';position:absolute;bottom:-1px;left:0;width:40px;height:1px;background:var(--gold);}
.coll-portrait-row{display:grid;grid-template-columns:repeat(8,1fr);gap:10px;margin-bottom:10px;}

/* PORTRAIT CARD — rotating poster hover */
.coll-portrait{position:relative;aspect-ratio:3/4;overflow:hidden;cursor:pointer;border:1px solid var(--border);transition:box-shadow 0.4s,border-color 0.3s;}
.coll-portrait:hover{box-shadow:var(--shadow-hover);border-color:rgba(201,168,76,0.5);}
/* Person photo layer — fades out on hover after delay */
.coll-person-photo{position:absolute;inset:0;background-size:cover;background-position:center top;filter:brightness(0.52) saturate(0.75);transition:opacity 0.6s ease,filter 0.4s;z-index:1;}
.coll-portrait.rotating .coll-person-photo{filter:brightness(0.0) saturate(0);opacity:0;}
/* Rotating poster layer — shows on hover */
.coll-poster-rotator{position:absolute;inset:0;z-index:2;overflow:hidden;}
.coll-poster-frame{position:absolute;inset:0;background-size:cover;background-position:center;opacity:0;transition:opacity 0.8s ease;}
.coll-poster-frame.active{opacity:1;}
.coll-portrait-overlay{position:absolute;inset:0;background:linear-gradient(to top,rgba(8,8,9,0.98) 0%,rgba(8,8,9,0.45) 50%,rgba(8,8,9,0.05) 100%);z-index:3;}
.coll-portrait-content{position:absolute;bottom:0;left:0;right:0;padding:10px 9px;z-index:4;}
.coll-portrait-type{font-family:'DM Mono',monospace;font-size:7px;letter-spacing:2px;text-transform:uppercase;color:var(--gold);margin-bottom:3px;line-height:1.2;}
.coll-portrait-name{font-family:'Bebas Neue',sans-serif;font-size:16px;letter-spacing:1.5px;color:var(--text);line-height:1;margin-bottom:3px;}
.coll-portrait-meta{font-family:'DM Mono',monospace;font-size:7px;color:var(--text2);letter-spacing:0.5px;}
.coll-portrait-cta{position:absolute;inset:0;display:flex;align-items:center;justify-content:center;z-index:5;opacity:0;transition:opacity 0.3s;}
.coll-portrait:hover .coll-portrait-cta{opacity:1;}
.coll-cta-pill{font-family:'DM Mono',monospace;font-size:8px;letter-spacing:2px;text-transform:uppercase;color:var(--gold);border:1px solid var(--gold);padding:5px 12px;background:rgba(8,8,9,0.85);backdrop-filter:blur(4px);}

/* MOVIE CARDS */
.movie-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(150px,1fr));gap:16px;padding-bottom:40px;}
.movie-card{cursor:pointer;perspective:800px;}
.card-inner{position:relative;width:100%;aspect-ratio:2/3;transition:transform 0.4s cubic-bezier(0.2,0.8,0.2,1),box-shadow 0.4s;box-shadow:var(--shadow-card);border-radius:2px;}
.movie-card:hover .card-inner{transform:perspective(800px) rotateX(-6deg) rotateY(8deg) translateY(-12px) scale(1.04);box-shadow:var(--shadow-hover);}
.card-inner::before{content:'';position:absolute;inset:0;background:linear-gradient(115deg,transparent 30%,rgba(255,255,255,0.06) 45%,transparent 65%);z-index:3;opacity:0;transition:opacity 0.3s;pointer-events:none;border-radius:2px;}
.movie-card:hover .card-inner::before{opacity:1;}
.card-inner::after{content:'';position:absolute;inset:-1px;border-radius:3px;background:linear-gradient(135deg,var(--gold2),transparent 40%,transparent 60%,var(--gold3));opacity:0;transition:opacity 0.4s;z-index:0;}
.movie-card:hover .card-inner::after{opacity:1;}
.card-poster{position:absolute;inset:0;overflow:hidden;border-radius:2px;background:var(--surface2);z-index:1;}
.card-poster img{width:100%;height:100%;object-fit:cover;transition:transform 0.5s cubic-bezier(0.2,0.8,0.2,1),filter 0.4s;filter:brightness(0.82) saturate(0.88) contrast(1.05);}
.movie-card:hover .card-poster img{transform:scale(1.08);filter:brightness(0.95) saturate(1.1);}
.card-fallback{width:100%;height:100%;display:flex;flex-direction:column;align-items:center;justify-content:center;gap:8px;background:linear-gradient(160deg,var(--surface2),var(--surface3));padding:16px;text-align:center;}
.card-fallback-title{font-family:'Bebas Neue',sans-serif;font-size:15px;letter-spacing:2px;color:var(--gold);line-height:1.1;}
.card-fallback-year{font-family:'DM Mono',monospace;font-size:9px;letter-spacing:2px;color:var(--text3);}
.card-gradient{position:absolute;bottom:0;left:0;right:0;height:55%;background:linear-gradient(to top,rgba(8,8,9,0.95) 0%,rgba(8,8,9,0.6) 50%,transparent 100%);z-index:2;border-radius:0 0 2px 2px;}
.card-badge{position:absolute;top:8px;right:8px;font-family:'DM Mono',monospace;font-size:7px;letter-spacing:1.5px;text-transform:uppercase;background:rgba(8,8,9,0.88);color:var(--gold);padding:3px 6px;border:1px solid rgba(201,168,76,0.3);z-index:4;backdrop-filter:blur(4px);}
.card-badge.bw{color:#a0a0b0;border-color:rgba(160,160,176,0.3);}
.card-badge.dvd{color:var(--text3);border-color:rgba(90,86,80,0.3);}
.card-badge.sd{color:#888;border-color:rgba(136,136,136,0.3);}
.card-shelf{position:absolute;bottom:0;left:0;right:0;padding:10px 10px 12px;z-index:4;}
.card-shelf-title{font-family:'Crimson Pro',serif;font-size:13px;font-weight:600;color:var(--text);line-height:1.2;margin-bottom:2px;text-shadow:0 1px 8px rgba(0,0,0,0.8);}
.card-shelf-meta{font-family:'DM Mono',monospace;font-size:7px;letter-spacing:1px;color:#8a8680;text-transform:uppercase;}
.card-hover-cta{position:absolute;inset:0;display:flex;align-items:center;justify-content:center;z-index:5;opacity:0;transition:opacity 0.3s;}
.movie-card:hover .card-hover-cta{opacity:1;}
.card-cta-pill{font-family:'DM Mono',monospace;font-size:9px;letter-spacing:3px;text-transform:uppercase;color:var(--gold);border:1px solid var(--gold);padding:6px 14px;background:rgba(8,8,9,0.85);backdrop-filter:blur(4px);transform:translateY(6px);transition:transform 0.3s cubic-bezier(0.2,0.8,0.2,1);}
.movie-card:hover .card-cta-pill{transform:translateY(0);}
.card-loading{position:absolute;inset:0;display:flex;align-items:center;justify-content:center;z-index:2;}
.card-spinner{width:18px;height:18px;border:2px solid var(--border);border-top-color:var(--gold);border-radius:50%;animation:spin 0.8s linear infinite;}
@keyframes spin{to{transform:rotate(360deg);}}
.movie-list{display:none;padding-bottom:40px;}
.list-header{display:grid;grid-template-columns:44px 1fr 130px 60px 60px 100px;gap:12px;padding:8px 14px;background:var(--surface);border-bottom:1px solid var(--border2);position:sticky;top:64px;z-index:10;}
.list-header span{font-family:'DM Mono',monospace;font-size:8px;letter-spacing:2px;color:var(--text3);text-transform:uppercase;}
.list-row{display:grid;grid-template-columns:44px 1fr 130px 60px 60px 100px;gap:12px;padding:9px 14px;border-bottom:1px solid var(--border);align-items:center;cursor:pointer;transition:background 0.15s;position:relative;}
.list-row::before{content:'';position:absolute;left:0;top:0;bottom:0;width:2px;background:var(--gold);transform:scaleY(0);transition:transform 0.2s;}
.list-row:hover{background:rgba(201,168,76,0.04);}
.list-row:hover::before{transform:scaleY(1);}
.list-thumb{width:30px;height:44px;object-fit:cover;border:1px solid var(--border);}
.list-thumb-fb{width:30px;height:44px;background:var(--surface2);border:1px solid var(--border);display:flex;align-items:center;justify-content:center;font-family:'DM Mono',monospace;font-size:7px;color:var(--gold3);text-align:center;line-height:1.2;}
.list-title-col{display:flex;flex-direction:column;gap:2px;min-width:0;}
.list-title-text{font-family:'Crimson Pro',serif;font-size:15px;font-weight:600;color:var(--text);white-space:nowrap;overflow:hidden;text-overflow:ellipsis;}
.list-dir{font-family:'DM Mono',monospace;font-size:8px;color:var(--text3);}
.list-genre{font-family:'DM Mono',monospace;font-size:8px;color:#a8a49c;}
.list-year{font-family:'DM Mono',monospace;font-size:10px;color:#9a9690;}
.list-rating-badge{font-family:'DM Mono',monospace;font-size:8px;color:var(--gold);padding:2px 5px;border:1px solid rgba(201,168,76,0.25);display:inline-block;}
.list-quality{font-family:'DM Mono',monospace;font-size:8px;color:var(--text3);text-transform:uppercase;}
body.list-view .movie-grid{display:none;}body.list-view .movie-list{display:block;}
body.grid-view .movie-grid{display:grid;}body.grid-view .movie-list{display:none;}

/* HUB */
#hub{position:fixed;inset:0;z-index:400;background:var(--bg);overflow-y:auto;transform:translateX(100%);transition:transform 0.45s cubic-bezier(0.4,0,0.2,1);}
#hub.open{transform:translateX(0);}
.hub-nav{position:fixed;top:0;left:0;right:0;z-index:410;display:flex;align-items:center;gap:16px;padding:0 32px;height:64px;background:linear-gradient(to bottom,rgba(8,8,9,0.98),transparent);backdrop-filter:blur(4px);}
.hub-back-btn{display:flex;align-items:center;gap:8px;font-family:'DM Mono',monospace;font-size:9px;letter-spacing:3px;text-transform:uppercase;color:var(--text3);background:none;border:1px solid var(--border);padding:7px 14px;cursor:pointer;transition:all 0.2s;}
.hub-back-btn:hover{color:var(--gold);border-color:var(--gold3);}
.hub-nav-title{font-family:'DM Mono',monospace;font-size:10px;letter-spacing:4px;color:var(--text3);}

/* HUB HERO — rotating backdrop */
.hub-hero{position:relative;height:440px;overflow:hidden;}
.hub-bg-frame{position:absolute;inset:0;background-size:cover;background-position:center 25%;filter:brightness(0.38) saturate(0.7);opacity:0;transition:opacity 1.2s ease;}
.hub-bg-frame.active{opacity:1;}

<script>

// ============================================================
// SOFT GATE — change password by editing this line and redeploying.
// Note: this is friction, not security. Anyone can view source.
// ============================================================
const VAULT_PASSWORD = "movie-guest1";
// Soft gate: stores the entered password in localStorage and re-validates on
// every load. Persists across browser restarts (one prompt per device, ever).
// To revoke access: change VAULT_PASSWORD above and redeploy. Everyone — you
// included — will be re-prompted on their next visit.
(function checkAccess(){
  const KEY = 'vault_password';
  const stored = localStorage.getItem(KEY);
  if(stored === VAULT_PASSWORD) return;
  // Either nothing stored, or stored an old password. Prompt fresh.
  if(stored !== null) localStorage.removeItem(KEY);
  const entered = prompt("Enter vault password:");
  if(entered === VAULT_PASSWORD){
    localStorage.setItem(KEY, entered);
    return;
  }
  document.body.innerHTML = '<div style="color:#f0ece2;background:#080809;padding:48px;font-family:Crimson Pro,Georgia,serif;font-size:18px;min-height:100vh;">Access denied.</div>';
  throw new Error("vault locked");
})();

// ============================================================
// TMDB constants + image helpers (unchanged from prior single-file vault)
// ============================================================
const TMDB_KEY='573382ec2121f69d6a89fce35293591a';
const TMDB_IMG='https://image.tmdb.org/t/p/';
function poster(p,s='w342'){return p?`${TMDB_IMG}${s}${p}`:null;}
function backdrop(p,s='w1280'){return p?`${TMDB_IMG}${s}${p}`:null;}
function profile(p,s='w185'){return p?`${TMDB_IMG}${s}${p}`:null;}

// ============================================================
// MATCH DSL — interprets match objects from collections.json / artists.json.
// Rule types: name_in_credits, name_in_credits_lower, title_includes,
//             genre_includes, genre_includes_lower, franchise_includes,
//             decade_equals, compound (with any/all/none).
// ============================================================
function matchRule(m, rule){
  switch(rule.type){
    case 'name_in_credits':
      return rule.fields.some(f => (m[f]||'').includes(rule.value));
    case 'name_in_credits_lower': {
      const v = rule.value.toLowerCase();
      return rule.fields.some(f => (m[f]||'').toLowerCase().includes(v));
    }
    case 'title_includes':       return m.title.includes(rule.value);
    case 'genre_includes':       return m.genre.includes(rule.value);
    case 'genre_includes_lower': return m.genre.toLowerCase().includes(rule.value.toLowerCase());
    case 'franchise_includes':   return (m.franchise||'').includes(rule.value);
    case 'decade_equals':        return m.decade === rule.value;
    case 'compound': {
      let ok = true;
      if(rule.all)  ok = ok && rule.all.every(r => matchRule(m, r));
      if(rule.any)  ok = ok && rule.any.some(r => matchRule(m, r));
      if(rule.none) ok = ok && !rule.none.some(r => matchRule(m, r));
      return ok;
    }
  }
  console.warn('Unknown match rule type:', rule.type);
  return false;
}
function makeMatchFn(matchObj){ return (m) => matchRule(m, matchObj); }

// ============================================================
// DATA LOADING — fetch all three JSONs in parallel, then run the vault.
// Renderer (runVault) depends on MOVIES / LANDSCAPE_COLLECTIONS /
// PORTRAIT_COLLECTIONS being populated before it executes.
// ============================================================
let MOVIES = [];
let LANDSCAPE_COLLECTIONS = [];
let PORTRAIT_COLLECTIONS  = [];

(async function bootstrap(){
  try{
    const [moviesData, collectionsData, artistsData] = await Promise.all([
      fetch('data/movies.json').then(r => { if(!r.ok) throw new Error('movies.json '+r.status); return r.json(); }),
      fetch('data/collections.json').then(r => { if(!r.ok) throw new Error('collections.json '+r.status); return r.json(); }),
      fetch('data/artists.json').then(r => { if(!r.ok) throw new Error('artists.json '+r.status); return r.json(); }),
    ]);

    MOVIES = moviesData;

    // Filter to active entries; synthesize matchFn from declarative match object.
    LANDSCAPE_COLLECTIONS = collectionsData
      .filter(c => c.active)
      .map(c => ({ ...c, matchFn: makeMatchFn(c.match) }));

    PORTRAIT_COLLECTIONS = artistsData
      .filter(a => a.active)
      .map(a => ({ ...a, matchFn: makeMatchFn(a.match) }));

    runVault();
  }catch(err){
    console.error('Failed to load vault data:', err);
    document.body.innerHTML =
      '<div style="color:#f0ece2;background:#080809;padding:48px;font-family:Crimson Pro,Georgia,serif;font-size:18px;min-height:100vh;">'
      + 'Failed to load vault data. Check console for details.<br><br><code style="color:#c9a84c;">'
      + String(err).replace(/[<>]/g,'') + '</code></div>';
  }
})();

// ============================================================
// runVault — contains the original renderer. Called only after data loads.
// ============================================================
function runVault(){


// ============================================================
// STATE
// ============================================================
const state={filtered:[...MOVIES],decade:'all',genre:null,rating:null,quality:null,color:null,
  search:'',heroMovies:[],heroIdx:0,heroTimer:null,tmdbCache:{},
  hubBgTimer:null,hubBgIdx:0,hubBgFrames:[]};

// ============================================================
// TMDB HELPERS
// ============================================================
async function tmdbFetch(path,params={}){
  const key=path+JSON.stringify(params);
  if(state.tmdbCache[key])return state.tmdbCache[key];
  try{
    const q=new URLSearchParams({api_key:TMDB_KEY,...params});
    const d=await fetch(`https://api.themoviedb.org/3${path}?${q}`).then(r=>r.json());
    state.tmdbCache[key]=d;return d;
  }catch(e){return null;}
}
async function tmdbCredits(id){return tmdbFetch(`/movie/${id}/credits`);}
async function tmdbPerson(id){return tmdbFetch(`/person/${id}`);}
async function tmdbMovie(id){return tmdbFetch(`/movie/${id}`);}
async function tmdbCollection(id){return tmdbFetch(`/collection/${id}`);}

// ============================================================
// HERO SPOTLIGHT
// ============================================================
function initHero(){
  // Rotate through every film with a backdrop. No fixed pool size — the
  // pool is the whole vault, shuffled. Dots row is hidden because it
  // wouldn't be meaningful at this scale.
  state.heroMovies = MOVIES.filter(m => m.backdrop).sort(() => Math.random() - 0.5);
  const dots = document.getElementById('heroDots');
  if(dots) dots.style.display = 'none';
  showHero(0);
  state.heroTimer = setInterval(
    () => showHero((state.heroIdx + 1) % state.heroMovies.length),
    7000
  );
}
function showHero(idx){
  state.heroIdx=idx;const m=state.heroMovies[idx];if(!m)return;
  document.querySelectorAll('.hero-dot').forEach((d,i)=>d.classList.toggle('active',i===idx));
  document.getElementById('heroTitle').textContent=m.title;
  document.getElementById('heroEyebrow').textContent=m.decade+' · '+m.genre.split('/')[0];
  document.getElementById('heroDesc').textContent=m.desc||'';
  document.getElementById('heroMeta').innerHTML=`<span>${m.year}</span><span class="hdot">●</span><span>${m.dir}</span><span class="hdot">●</span><span>${m.rating}</span><span class="hdot">●</span><span>${m.runtime} min</span>`;
  document.getElementById('heroBg').style.backgroundImage=m.backdrop?`url('${backdrop(m.backdrop)}')`:'linear-gradient(135deg,#13131a,#252532)';
}
function jumpHero(idx){state.heroIdx=idx;showHero(idx);clearInterval(state.heroTimer);state.heroTimer=setInterval(()=>showHero((state.heroIdx+1)%state.heroMovies.length),7000);}
function openHeroModal(){const m=state.heroMovies[state.heroIdx];if(m)openModal(m);}

// FILTERS
// ============================================================
function initFilters(){
  const decades=['All','1920s','1930s','1940s','1950s','1960s','1970s','1980s','1990s','2000s','2010s','2020s'];
  const decadeHTML=decades.map(d=>
    `<button class="nav-filter-btn ${d==='All'?'active':''}" onclick="setDecade('${d}')">${d}</button>`).join('');
  document.getElementById('navDecades').innerHTML=decadeHTML;
  const db=document.getElementById('decadeBar');
  if(db)db.innerHTML=decadeHTML;
  const gc={};MOVIES.forEach(m=>{const g=m.genre.split('/')[0];gc[g]=(gc[g]||0)+1;});
  document.getElementById('genreChips').innerHTML=Object.entries(gc).sort((a,b)=>b[1]-a[1]).slice(0,14)
    .map(([g])=>`<button class="chip" onclick="toggleChip(this,'genre','${g}')">${g}</button>`).join('');
  ['G','PG','PG-13','R','NR','Not Rated'].forEach(r=>{document.getElementById('ratingChips').innerHTML+=`<button class="chip" onclick="toggleChip(this,'rating','${r}')">${r}</button>`;});
  ['Hi-Def','DVD'].forEach(q=>{document.getElementById('qualityChips').innerHTML+=`<button class="chip" onclick="toggleChip(this,'quality','${q}')">${q}</button>`;});
  ['Color','B&W'].forEach(c=>{document.getElementById('colorChips').innerHTML+=`<button class="chip" onclick="toggleChip(this,'color','${c}')">${c}</button>`;});
}
function toggleChip(el,type,val){
  const active=el.classList.contains('active');
  el.parentElement.querySelectorAll('.chip').forEach(c=>c.classList.remove('active'));
  state[type]=active?null:val;if(!active)el.classList.add('active');applyFilters();
}
function setDecade(d){
  state.decade=d==='All'?'all':d;
  document.querySelectorAll('#navDecades .nav-filter-btn, #decadeBar .nav-filter-btn').forEach(b=>b.classList.toggle('active',b.textContent===d));
  applyFilters();
}
function toggleFilters(){document.getElementById('filterDrawer').classList.toggle('open');document.getElementById('btnFilters').classList.toggle('active');}
function clearFilters(){state.genre=state.rating=state.quality=state.color=null;document.querySelectorAll('.chip.active').forEach(c=>c.classList.remove('active'));applyFilters();}
function handleSearch(){state.search=document.getElementById('searchInput').value.toLowerCase();applyFilters();}
function goHome(){closeHub();closeModal();window.scrollTo({top:0,behavior:'smooth'});}
function scrollToCollections(){document.getElementById('collectionsSection').scrollIntoView({behavior:'smooth'});}

function applyFilters(){
  let f=[...MOVIES];
  if(state.decade!=='all')f=f.filter(m=>m.decade===state.decade);
  if(state.genre)f=f.filter(m=>m.genre.includes(state.genre));
  if(state.rating)f=f.filter(m=>m.rating===state.rating);
  if(state.quality)f=f.filter(m=>m.quality===state.quality);
  if(state.color)f=f.filter(m=>m.color===state.color);
  if(state.search)f=f.filter(m=>
    m.title.toLowerCase().includes(state.search)||m.dir.toLowerCase().includes(state.search)||
    m.actor.toLowerCase().includes(state.search)||m.supp.toLowerCase().includes(state.search)||
    m.cast.toLowerCase().includes(state.search)||m.franchise.toLowerCase().includes(state.search));
  state.filtered=f;
  renderGrid();renderList();
  document.getElementById('collectionCount').textContent=`${f.length.toLocaleString()} films`;
  document.getElementById('filterCount').textContent=`${f.length.toLocaleString()} of ${MOVIES.length.toLocaleString()} films`;
  document.getElementById('noResults').classList.toggle('show',f.length===0);
}

function makeCard(movie,idPrefix,i){
  const card=document.createElement('div');
  card.className='movie-card';
  card.style.animation=`fadeInUp 0.35s ease ${Math.min(i*0.02,0.5)}s both`;
  card.innerHTML=`<div class="card-inner">
    <div class="card-poster" id="${idPrefix}${i}"><div class="card-loading"><div class="card-spinner"></div></div></div>
    <div class="card-gradient"></div>
    <div class="card-badge ${(movie.quality==='DVD')?'dvd':movie.quality==='SD'?'sd':''}">${movie.quality==='DVD'?'DVD':movie.quality==='SD'?'SD':'HI-DEF'}</div>
    ${movie.color==='B&W'?'<div class=\"card-badge bw\" style=\"top:28px\">B&amp;W</div>':''}
    <div class="card-shelf"><div class="card-shelf-title">${movie.title}</div><div class="card-shelf-meta">${movie.year} · ${movie.genre.split('/')[0]}</div></div>
    <div class="card-hover-cta"><div class="card-cta-pill">View Details</div></div>
  </div>`;
  card.onclick=()=>openModal(movie);
  const el=card.querySelector(`#${idPrefix}${i}`);
  const obs=new IntersectionObserver((entries,o)=>{
    if(entries[0].isIntersecting){o.disconnect();
      if(movie.poster){const img=new Image();img.src=poster(movie.poster);img.alt=movie.title;
        img.onload=()=>{el.innerHTML='';el.appendChild(img);};img.onerror=()=>fbPoster(el,movie);}
      else fbPoster(el,movie);}
  },{rootMargin:'300px'});
  obs.observe(card);
  return card;
}
function fbPoster(el,m){el.innerHTML=`<div class="card-fallback"><div class="card-fallback-title">${m.title}</div><div class="card-fallback-year">${m.year}</div></div>`;}

function renderGrid(){
  const grid=document.getElementById('movieGrid');grid.innerHTML='';
  state.filtered.forEach((m,i)=>grid.appendChild(makeCard(m,'gp',i)));
}
function renderList(){
  const rows=document.getElementById('listRows');rows.innerHTML='';
  state.filtered.forEach((movie,i)=>{
    const row=document.createElement('div');row.className='list-row';
    row.innerHTML=`<div class="list-thumb-fb" id="lt${i}">${movie.year.toString().slice(2)}</div>
      <div class="list-title-col"><div class="list-title-text">${movie.title}</div><div class="list-dir">${movie.dir}</div></div>
      <div class="list-genre">${movie.genre}</div><div class="list-year">${movie.year}</div>
      <div><span class="list-rating-badge">${movie.rating}</span></div>
      <div class="list-quality">${movie.quality==='DVD'?'DVD':movie.quality==='SD'?'SD':'Hi-Def'}</div>`;
    row.onclick=()=>openModal(movie);rows.appendChild(row);
    if(movie.poster){const el=row.querySelector(`#lt${i}`);
      const obs=new IntersectionObserver((entries,o)=>{if(entries[0].isIntersecting){o.disconnect();
        const img=new Image();img.className='list-thumb';img.src=poster(movie.poster,'w92');img.alt=movie.title;
        img.onload=()=>el.replaceWith(img);}},{rootMargin:'200px'});obs.observe(row);}
  });
}

// ============================================================
// COLLECTION CARD HOVER — rotating poster effect
// ============================================================
// Gets up to 4 random posters from a collection's films
function getCollectionPosters(coll, count=4){
  const films=MOVIES.filter(coll.matchFn).filter(m=>m.poster);
  // Shuffle
  for(let i=films.length-1;i>0;i--){const j=Math.floor(Math.random()*(i+1));[films[i],films[j]]=[films[j],films[i]];}
  return films.slice(0,count).map(m=>`${TMDB_IMG}w342${m.poster}`);
}

// Gets up to 5 random backdrops from a collection's films
function getCollectionBackdrops(coll, count=5){
  const films=MOVIES.filter(coll.matchFn).filter(m=>m.backdrop);
  for(let i=films.length-1;i>0;i--){const j=Math.floor(Math.random()*(i+1));[films[i],films[j]]=[films[j],films[i]];}
  return films.slice(0,count).map(m=>`${TMDB_IMG}w1280${m.backdrop}`);
}

function setupCardHover(card, coll, personPhotoUrl){
  const posters=getCollectionPosters(coll);
  if(posters.length===0)return;

  // Pre-build poster frames inside the rotator div
  const rotator=card.querySelector('.coll-poster-rotator');
  posters.forEach((url,i)=>{
    const frame=document.createElement('div');
    frame.className='coll-poster-frame';
    frame.style.backgroundImage=`url('${url}')`;
    rotator.appendChild(frame);
  });

  let hoverTimer=null, delayTimer=null, frameIdx=0;

  card.addEventListener('mouseenter',()=>{
    // 0.5s delay before starting rotation
    delayTimer=setTimeout(()=>{
      frameIdx=0;
      card.classList.add('rotating');
      // Show first poster frame
      const frames=rotator.querySelectorAll('.coll-poster-frame');
      frames.forEach((f,i)=>f.classList.toggle('active',i===0));
      // Rotate every 1.5s
      hoverTimer=setInterval(()=>{
        frameIdx=(frameIdx+1)%frames.length;
        frames.forEach((f,i)=>f.classList.toggle('active',i===frameIdx));
      },1500);
    },500);
  });

  card.addEventListener('mouseleave',()=>{
    clearTimeout(delayTimer);
    clearInterval(hoverTimer);
    card.classList.remove('rotating');
    const frames=rotator.querySelectorAll('.coll-poster-frame');
    frames.forEach(f=>f.classList.remove('active'));
    frameIdx=0;
  });
}

// ============================================================
// HUB BACKDROP ROTATOR
// ============================================================
function startHubBackdropRotation(coll){
  clearInterval(state.hubBgTimer);
  state.hubBgIdx=0;
  state.hubBgFrames=[];

  const backdrops=getCollectionBackdrops(coll,5);
  if(backdrops.length===0)return;

  const container=document.getElementById('hubBgContainer');
  if(!container)return;

  // Create frames
  container.innerHTML='';
  backdrops.forEach((url,i)=>{
    const frame=document.createElement('div');
    frame.className=`hub-bg-frame${i===0?' active':''}`;
    frame.style.backgroundImage=`url('${url}')`;
    container.appendChild(frame);
  });
  state.hubBgFrames=container.querySelectorAll('.hub-bg-frame');

  // Start rotating after 4 seconds
  state.hubBgTimer=setTimeout(()=>{
    state.hubBgTimer=setInterval(()=>{
      state.hubBgIdx=(state.hubBgIdx+1)%state.hubBgFrames.length;
      state.hubBgFrames.forEach((f,i)=>f.classList.toggle('active',i===state.hubBgIdx));
    },5000);
  },4000);
}

// ============================================================
// COLLECTIONS RENDERING
// ============================================================
async function renderCollections(){
  // Landscape
  const lc=document.getElementById('landscapeColls');
  LANDSCAPE_COLLECTIONS.forEach(coll=>{
    const films=MOVIES.filter(coll.matchFn);
    const card=document.createElement('div');card.className='coll-landscape';
    card.innerHTML=`<div class="coll-bg-main" id="lcbg-${coll.id}"></div><div class="coll-overlay"></div>
      <div class="coll-content"><div class="coll-type">${coll.type}</div>
        <div class="coll-title">${coll.title}</div>
        <div class="coll-meta">${films.length} films · ${coll.years}</div></div>
      <div class="coll-arrow">→</div>`;
    card.onclick=()=>openHub(coll);lc.appendChild(card);
    if(coll.customImage){
      const el=document.getElementById(`lcbg-${coll.id}`);
      if(el)el.style.backgroundImage=`url('${coll.customImage}')`;
    } else {
      const heroFilm=films.find(m=>m.backdrop);
      if(heroFilm){const el=document.getElementById(`lcbg-${coll.id}`);if(el)el.style.backgroundImage=`url('${backdrop(heroFilm.backdrop)}')`;}
    }
  });

  // Portrait rows
  const row1=document.getElementById('portraitRow1');
  const row2=document.getElementById('portraitRow2');

  for(let i=0;i<PORTRAIT_COLLECTIONS.length;i++){
    const coll=PORTRAIT_COLLECTIONS[i];
    const films=MOVIES.filter(coll.matchFn);
    const card=document.createElement('div');card.className='coll-portrait';
    card.innerHTML=`
      <div class="coll-person-photo" id="pphoto-${coll.id}"></div>
      <div class="coll-poster-rotator" id="protator-${coll.id}"></div>
      <div class="coll-portrait-overlay"></div>
      <div class="coll-portrait-content">
        <div class="coll-portrait-type">${coll.type}</div>
        <div class="coll-portrait-name">${coll.shortName}</div>
        <div class="coll-portrait-meta">${films.length} films · ${coll.years||''}</div>
      </div>
      <div class="coll-portrait-cta"><div class="coll-cta-pill">Explore</div></div>`;
    card.onclick=()=>openHub(coll);
    row1.appendChild(card);

    // Async: fetch person photo, then set up hover rotation
    (async(c,cardEl)=>{
      let personPhotoUrl=null;

      // Custom local image takes priority over TMDB lookup.
      if(c.customImage){
        personPhotoUrl=c.customImage;
        const el=document.getElementById(`pphoto-${c.id}`);
        if(el)el.style.backgroundImage=`url('${personPhotoUrl}')`;
      } else if(c.personId){
        const p=await tmdbPerson(c.personId);
        if(p&&p.profile_path){
          personPhotoUrl=`${TMDB_IMG}h632${p.profile_path}`;
          const el=document.getElementById(`pphoto-${c.id}`);
          if(el)el.style.backgroundImage=`url('${personPhotoUrl}')`;
        }
      } else if(c.movieId){
        const m=await tmdbMovie(c.movieId);
        if(m&&m.poster_path){
          personPhotoUrl=`${TMDB_IMG}w500${m.poster_path}`;
          const el=document.getElementById(`pphoto-${c.id}`);
          if(el)el.style.backgroundImage=`url('${personPhotoUrl}')`;
        }
      } else if(c.collectionId){
        const col=await tmdbCollection(c.collectionId);
        if(col&&col.poster_path){
          personPhotoUrl=`${TMDB_IMG}w500${col.poster_path}`;
          const el=document.getElementById(`pphoto-${c.id}`);
          if(el)el.style.backgroundImage=`url('${personPhotoUrl}')`;
        }
      }

      // If no person photo, fallback to first film poster
      if(!personPhotoUrl){
        const heroFilm=MOVIES.filter(c.matchFn).find(m=>m.poster);
        if(heroFilm){
          const el=document.getElementById(`pphoto-${c.id}`);
          if(el)el.style.backgroundImage=`url('${TMDB_IMG}w342${heroFilm.poster}')`;
        }
      }

      // Setup hover rotation with movie posters
      setupCardHover(cardEl,c,personPhotoUrl);

    })(coll,card);
  }

  document.getElementById('collCount').textContent=
    `${LANDSCAPE_COLLECTIONS.length+PORTRAIT_COLLECTIONS.length} curated collections`;
}

// HUB
// ============================================================
async function openHub(coll){
  clearInterval(state.hubBgTimer);clearTimeout(state.hubBgTimer);
  const hub=document.getElementById('hub'),content=document.getElementById('hubContent');
  document.getElementById('hubNavTitle').textContent=coll.title||coll.name;
  content.innerHTML=`<div style="display:flex;align-items:center;justify-content:min-height:400px;"><div class="modal-loading"><div class="modal-spinner"></div><div class="modal-loading-text">Loading collection…</div></div></div>`;
  hub.classList.add('open');document.body.style.overflow='hidden';

  const films=MOVIES.filter(coll.matchFn);

  content.innerHTML=`
    <div class="hub-hero">
      <div id="hubBgContainer"></div>
      <div class="hub-hero-overlay"></div>
      <div class="hub-hero-content">
        <div class="hub-text">
          <div class="hub-eyebrow">${coll.type}</div>
          <div class="hub-name">${coll.name||coll.title}</div>
          <div class="hub-meta">
            <span>${films.length} films in collection</span>
            ${coll.years?`<span class="hub-meta-dot">●</span><span>${coll.years}</span>`:''}
          </div>
          <div class="hub-bio">${coll.desc||''}</div>
        </div>
      </div>
    </div>
    <div class="hub-body">
      <div class="hub-section-header">
        <div class="hub-section-title">The Films</div>
        <div class="hub-count">${films.length} titles</div>
      </div>
      <div class="hub-grid" id="hubGrid"></div>
    </div>`;

  // Start rotating backdrop
  startHubBackdropRotation(coll);

  // Render film cards
  const grid=document.getElementById('hubGrid');
  films.forEach((m,i)=>grid.appendChild(makeCard(m,'hp',i)));
}

function closeHub(){
  clearInterval(state.hubBgTimer);clearTimeout(state.hubBgTimer);
  document.getElementById('hub').classList.remove('open');
  document.body.style.overflow='';
}

function setView(v){
  document.body.className=v==='grid'?'grid-view':'list-view';
  document.getElementById('btnGrid').classList.toggle('active',v==='grid');
  document.getElementById('btnList').classList.toggle('active',v==='list');
}

// ============================================================
async function init(){
  renderStats();initFilters();applyFilters();
  renderCollections();initHero();
}
// Expose functions that are called from inline onclick="..." attributes
// in the HTML markup. These attributes are evaluated in the global scope,
// so the functions need to be on window — they're defined inside runVault()
// here, which means they're not global by default.
Object.assign(window, {
  goHome, scrollToCollections, setView, toggleFilters, clearFilters,
  openHeroModal, jumpHero, setDecade, toggleChip,
  closeHub, closeModal, handleOverlayClick, openHub
});

init();

} // end runVault
